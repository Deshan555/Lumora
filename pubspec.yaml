name: grammer_llm
description: "Offline AI-powered grammar correction app using on-device LLM models via llama.cpp"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management - Riverpod
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Navigation
  go_router: ^14.2.0
  
  # Networking & Downloads
  dio: ^5.5.0+1
  
  # Local Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  
  # LLM Integration
  llamadart: ^0.6.9
  
  # Permissions & Device Info
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.0
  
  # Utilities
  crypto: ^3.0.3
  share_plus: ^12.0.2
  path: ^1.9.0
  uuid: ^4.4.0
  
  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.2+1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  drift_dev: ^2.18.0

flutter:
  uses-material-design: true

  # Assets configuration
  assets:
    - assets/models/
