name: edge_llm
description: "Premium offline AI chat app using on-device LLM models with edge intelligence"
publish_to: 'none'

version: 1.1.0+2002

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Security - Biometrics
  local_auth: ^2.3.0
  
  # State Management - Riverpod
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Navigation
  go_router: ^14.8.1
  
  # Networking & Downloads
  dio: ^5.5.0+1
  
  # Local Database
  drift: ^2.19.2
  sqlite3_flutter_libs: ^0.5.42
  path_provider: ^2.1.3
  
  # LLM Integration - LiteRT-LM & llama.cpp (GGUF)
  flutter_gemma: ^0.10.2          # LiteRT-LM for Gemma models
  llamadart: ^0.6.9               # llama.cpp for GGUF models (working!)
  
  # Permissions & Device Info
  permission_handler: ^11.4.0
  device_info_plus: ^10.1.2
  
  # Utilities
  crypto: ^3.0.3
  share_plus: ^12.0.2
  path: ^1.9.0
  uuid: ^4.4.0
  shared_preferences: ^2.5.5
  
  # UI & Fonts
  google_fonts: ^6.3.3
  flutter_markdown: ^0.7.7+1
  intl: ^0.19.0
  font_awesome_flutter: ^10.10.0
  
  # Voice & TTS
  flutter_tts: ^4.2.0
  speech_to_text: ^7.0.0
  
  # File picking
  file_picker: ^8.3.7
  flutter_secure_storage: ^10.0.0
  photo_view: ^0.15.0
  gal: ^2.3.2
  photo_manager: ^3.9.0
  image_cropper: ^12.2.0
  image: ^4.3.0
  url_launcher: ^6.3.2
  webview_flutter: ^4.13.1
  async_wallpaper: ^3.1.0
  flutter_local_notifications: ^21.0.0
  flutter_spinkit: ^5.2.2
  markdown: ^7.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.0
  drift_dev: ^2.19.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/logo/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/logo/logo.png"
  min_sdk_android: 23 # android min sdk min:16, default 21
